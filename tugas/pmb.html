    <h2>Penerimaan Mahasiswa Baru</h2>
    <p>Universitas MDP membuka penerimaan mahasiswa baru untuk tahun akademik 2025/2026. Silahkan daftar segera!</p>

    <form>

        <label>Nama Lengkap</label><br>
        <input type="text"><br>

        <label>Jenis Kelamin</label><br>
            <div class="radio-group">
                <input type="radio" name="jk" value="Laki-laki"> Laki-laki
                <input type="radio" name="jk" value="Perempuan"> Perempuan
            </div>
        </br>

        <label>Nomor HP</label><br>
        <input type="text"><br>

        <label>Email</label><br>
        <input type="email"><br>

        <label>Alamat</label><br>
        <textarea rows="3"></textarea><br>

        <label>Pilihan Program Studi</label>
        <br>
        <select>
            <option>Sistem Informasi (S1)</option>
            <option>Teknik Informatika (S1)</option>
            <option>Manajemen (S1)</option>
        </select>
        <br>

        <button type="submit">Daftar</button>

    </form>

    <footer>
        © 2025 Universitas MDP
    </footer>
